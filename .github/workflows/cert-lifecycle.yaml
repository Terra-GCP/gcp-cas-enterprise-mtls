# GCP CAS Enterprise Client mTLS Lifecycle — manual run (delegates to reusable workflow).
name: GCP CAS Enterprise mTLS lifecycle

on:
  workflow_dispatch:
    inputs:
      action:
        description: issue or revoke
        type: choice
        options:
          - issue
          - revoke
        required: true
        default: issue
      workload_app:
        description: Workload application slug (allow-list)
        type: string
        required: true
        default: sample-app
      workload_env:
        description: Environment label (examples in repo — use your org’s names)
        type: choice
        options:
          - dev
          - sandbox
          - prod
        required: true
        default: dev
      workload_project_id:
        description: GCP project where trust config and workloads run
        type: string
        required: true
        default: YOUR_WORKLOAD_PROJECT_ID
      trust_config_name:
        description: Trust config id (leave empty for trust-config-{app}-{env})
        type: string
        required: false
        default: ""
      common_name:
        description: Certificate CN (issue only)
        type: string
        required: false
        default: ""
      organizational_unit:
        description: OU env-app (issue only)
        type: string
        required: false
        default: ""
      validity_days:
        description: Lifetime in days (issue only)
        type: string
        required: false
        default: "400"
      certificate_id:
        description: Certificate id to revoke (revoke only)
        type: string
        required: false
        default: ""
      test_mode:
        description: If true, skip gcloud mutations
        type: boolean
        required: true
        default: true
      pki_project_id:
        description: PKI / Private CA project
        type: string
        required: true
        default: YOUR_PKI_PROJECT_ID
      pki_region:
        type: string
        required: true
        default: us-central1
      ca_pool_id:
        type: string
        required: true
        default: ca-pool-sub-example
      ca_id:
        type: string
        required: true
        default: ca-sub-example-issuing-a
      cert_template:
        type: string
        required: true
        default: tpl-client-example-v1
      storage_bucket:
        description: GCS bucket for exports and issued cert PEMs
        type: string
        required: true
        default: YOUR_ARTIFACT_BUCKET
      allowed_apps:
        type: string
        required: true
        default: sample-app,sample-service
      min_validity_days:
        type: string
        required: true
        default: "365"
      max_validity_days:
        type: string
        required: true
        default: "730"
      max_validity_days_prod:
        description: Max days for strict envs (see strict_validity_envs)
        type: string
        required: true
        default: "548"
      strict_validity_envs:
        description: Comma-separated envs using the stricter max (example — match your labels)
        type: string
        required: true
        default: prod
      maint_window_start_month:
        type: string
        required: true
        default: "11"
      maint_window_end_month:
        type: string
        required: true
        default: "1"
      maint_window_end_day:
        type: string
        required: true
        default: "7"

permissions:
  contents: read
  id-token: write

jobs:
  cert-lifecycle:
    uses: ./.github/workflows/cert-lifecycle-reusable.yaml
    with:
      action: ${{ inputs.action }}
      workload_app: ${{ inputs.workload_app }}
      workload_env: ${{ inputs.workload_env }}
      workload_project_id: ${{ inputs.workload_project_id }}
      trust_config_name: ${{ inputs.trust_config_name }}
      common_name: ${{ inputs.common_name }}
      organizational_unit: ${{ inputs.organizational_unit }}
      validity_days: ${{ inputs.validity_days }}
      certificate_id: ${{ inputs.certificate_id }}
      test_mode: ${{ inputs.test_mode }}
      pki_project_id: ${{ inputs.pki_project_id }}
      pki_region: ${{ inputs.pki_region }}
      ca_pool_id: ${{ inputs.ca_pool_id }}
      ca_id: ${{ inputs.ca_id }}
      cert_template: ${{ inputs.cert_template }}
      storage_bucket: ${{ inputs.storage_bucket }}
      allowed_apps: ${{ inputs.allowed_apps }}
      min_validity_days: ${{ inputs.min_validity_days }}
      max_validity_days: ${{ inputs.max_validity_days }}
      max_validity_days_prod: ${{ inputs.max_validity_days_prod }}
      strict_validity_envs: ${{ inputs.strict_validity_envs }}
      maint_window_start_month: ${{ inputs.maint_window_start_month }}
      maint_window_end_month: ${{ inputs.maint_window_end_month }}
      maint_window_end_day: ${{ inputs.maint_window_end_day }}
    secrets: inherit
